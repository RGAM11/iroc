<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#3D7A8F" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icon-192.png" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <meta name="apple-mobile-web-app-title" content="IROC" />
  <title>Emory IROC</title>
  <style>*{margin:0;padding:0;box-sizing:border-box} html,body{overflow-x:hidden;width:100%} body{-webkit-font-smoothing:antialiased}</style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.getRegistrations().then(regs => {
          regs.forEach(r => r.unregister());
        }).then(() => {
          navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' }).then(reg => {
            reg.update();
          });
        });
      });
    }
  </script>
</body>
</html>
